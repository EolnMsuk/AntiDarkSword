name: Compile TrollFools Dylib

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Extract Tweak Version
        id: get_version
        run: |
          VERSION=$(grep -i '^Version:' control | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build TrollFools Dylib
        run: |
          make -f Makefile.trollfools clean
          make -f Makefile.trollfools FINALPACKAGE=1

      - name: Collect Dylib
        run: |
          mkdir -p output
          cp .theos/obj/AntiDarkSwordTF/AntiDarkSword.dylib \
             output/AntiDarkSword_${{ env.VERSION }}_TrollFools.dylib

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSword-TrollFools
          path: output/AntiDarkSword_${{ env.VERSION }}_TrollFools.dylib

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: trollfools-${{ github.run_number }}
          name: "AntiDarkSword v${{ env.VERSION }} (TrollFools Build #${{ github.run_number }})"
          body: |
            TrollFools / TrollStore dylib build of AntiDarkSword v${{ env.VERSION }}.

            **Installation:**
            1. Download `AntiDarkSword_*_TrollFools.dylib`
            2. Open TrollFools, pick the app you want protected, tap **+**, select the dylib
            3. No jailbreak required

            **Protections active by default:** JIT disable, media autoplay block, local file access block, iMessage auto-download block (Messages only), UA spoofing
            **Off by default (edit plist to enable):** WebGL/WebRTC, JavaScript disable

            **Note:** Daemon-layer zero-click protection (imagent/apsd hooks) and the Corellium honeypot require the full jailbreak build.
          files: output/AntiDarkSword_${{ env.VERSION }}_TrollFools.dylib
          draft: true
          prerelease: false
          make_latest: false
