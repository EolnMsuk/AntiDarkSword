name: Compile & Release Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Give the GitHub Actions bot permission to create a release
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Fetch & Install AltList Framework
        run: |
          echo "Fetching latest AltList release from GitHub..."
          ALTLIST_URL=$(curl -s https://api.github.com/repos/opa334/AltList/releases/latest | grep "browser_download_url.*\.deb" | cut -d '"' -f 4 | head -n 1)
          curl -sL $ALTLIST_URL -o altlist.deb
          
          echo "Extracting deb..."
          dpkg-deb -x altlist.deb altlist_extracted
          
          echo "Installing AltList.framework to Theos..."
          FRAMEWORK_PATH=$(find altlist_extracted -type d -name "AltList.framework")
          cp -r "$FRAMEWORK_PATH" $THEOS/lib/

      - name: Compile the Tweak
        run: make package FINALPACKAGE=1

      # (Optional) Keep the artifact upload as a backup
      - name: Upload .deb as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSword-Rootless
          path: ${{ github.workspace }}/packages/*.deb

      # Create the Release and upload the .deb file directly to it
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Automatically generates a unique tag based on the workflow run number
          tag_name: build-${{ github.run_number }}
          name: "AntiDarkSword Build #${{ github.run_number }}"
          body: "Automated build of AntiDarkSword compiled directly from the latest push to the main branch."
          files: ${{ github.workspace }}/packages/*.deb
          draft: false
          prerelease: false
