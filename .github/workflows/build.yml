name: Compile & Release Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Copy AltList.framework to Theos
        run: cp -r vendor/AltList.framework $THEOS/lib/

      - name: Fix Script Permissions
        run: |
          chmod +x layout/DEBIAN/prerm || true
          chmod +x layout/DEBIAN/postinst || true

      - name: Extract Tweak Version
        id: get_version
        run: |
          VERSION=$(grep -i '^Version:' control | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare Output Directory
        run: mkdir -p output

      - name: Compile Rootful
        run: |
          make clean
          rm -rf packages/*
          install_name_tool -id /Library/Frameworks/AltList.framework/AltList vendor/AltList.framework/AltList
          make package FINALPACKAGE=1
          mv packages/*.deb output/AntiDarkSword_${{ env.VERSION }}_Rootful.deb

      - name: Compile Rootless
        run: |
          make clean
          rm -rf packages/*
          install_name_tool -id /var/jb/Library/Frameworks/AltList.framework/AltList vendor/AltList.framework/AltList
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb output/AntiDarkSword_${{ env.VERSION }}_Rootless.deb

      - name: Upload .deb Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSword-Packages
          path: output/*.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AntiDarkSword v${{ env.VERSION }} (Build #${{ github.run_number }})"
          body: "Automated rootful and rootless builds of AntiDarkSword v${{ env.VERSION }}."
          files: output/*.deb
          draft: false
          prerelease: false
