name: Compile & Release Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Give the GitHub Actions bot permission to create a release
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Fetch & Install AltList Framework
        env:
          # The GitHub CLI expects the token to be stored in GH_TOKEN
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching latest AltList release using GitHub CLI..."
          
          # Use GitHub's official CLI to securely download the .deb asset natively
          gh release download --repo opa334/AltList --pattern "*.deb"
          
          # Find the downloaded file dynamically
          DEB_FILE=$(ls *.deb | head -n 1)
          
          # Safety check
          if [ -z "$DEB_FILE" ]; then
            echo "Error: Failed to retrieve the .deb file from the release."
            exit 1
          fi
          
          echo "Extracting $DEB_FILE..."
          dpkg-deb -x "$DEB_FILE" altlist_extracted
          
          echo "Installing AltList.framework to Theos..."
          FRAMEWORK_PATH=$(find altlist_extracted -type d -name "AltList.framework")
          cp -r "$FRAMEWORK_PATH" $THEOS/lib/

      - name: Compile the Tweak
        run: make package FINALPACKAGE=1

      # (Optional) Keep the artifact upload as a backup
      - name: Upload .deb as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSword-Rootless
          path: ${{ github.workspace }}/packages/*.deb

      # Create the Release and upload the .deb file directly to it
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Automatically generates a unique tag based on the workflow run number
          tag_name: build-${{ github.run_number }}
          name: "AntiDarkSword Build #${{ github.run_number }}"
          body: "Automated build of AntiDarkSword compiled directly from the latest push to the main branch."
          files: ${{ github.workspace }}/packages/*.deb
          draft: false
          prerelease: false
