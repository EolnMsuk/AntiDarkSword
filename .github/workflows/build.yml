name: Compile & Release Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Fetch & Install AltList Framework
        run: |
          echo "Fetching latest AltList rootless deb directly from opa334's apt repository..."
          
          # Direct URL bypasses the GitHub API releases endpoint entirely
          ALTLIST_URL="https://raw.githubusercontent.com/opa334/opa334.github.io/master/debs/com.opa334.altlist_1.0.11_iphoneos-arm64.deb"
          
          echo "Downloading from: $ALTLIST_URL"
          curl -sL "$ALTLIST_URL" -o altlist.deb
          
          # Verify download was successful and not an empty/404 file
          if [ ! -s altlist.deb ] || grep -q "404: Not Found" altlist.deb; then
            echo "Error: Failed to retrieve the AltList .deb file."
            exit 1
          fi
          
          echo "Extracting deb..."
          dpkg-deb -x altlist.deb altlist_extracted
          
          echo "Installing AltList.framework to Theos..."
          FRAMEWORK_PATH=$(find altlist_extracted -type d -name "AltList.framework")
          
          if [ -z "$FRAMEWORK_PATH" ]; then
            echo "Error: Could not find AltList.framework inside the extracted deb."
            exit 1
          fi
          
          cp -r "$FRAMEWORK_PATH" $THEOS/lib/

      - name: Compile the Tweak
        run: make package FINALPACKAGE=1

      - name: Upload .deb as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSword-Rootless
          path: ${{ github.workspace }}/packages/*.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AntiDarkSword Build #${{ github.run_number }}"
          body: "Automated build of AntiDarkSword compiled directly from the latest push to the main branch."
          files: ${{ github.workspace }}/packages/*.deb
          draft: false
          prerelease: false
