name: Compile & Release Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Fix Script Permissions
        run: |
          chmod +x layout/DEBIAN/prerm || true
          chmod +x layout/DEBIAN/postinst || true

      - name: Extract Tweak Version
        id: get_version
        run: |
          VERSION=$(grep -i '^Version:' control | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare Output Directory
        run: mkdir -p output

      - name: Compile Rootful
        run: |
          make clean
          rm -rf packages/*
          cp -r vendor/AltList.framework $THEOS/lib/
          install_name_tool -id /Library/Frameworks/AltList.framework/AltList $THEOS/lib/AltList.framework/AltList
          make package FINALPACKAGE=1
          mv packages/*.deb output/com.eoln.antidarksword_${{ env.VERSION }}_iphoneos-arm.deb

      - name: Compile Rootless
        run: |
          make clean
          rm -rf packages/*
          cp -r vendor/AltList.framework $THEOS/lib/
          install_name_tool -id /var/jb/Library/Frameworks/AltList.framework/AltList $THEOS/lib/AltList.framework/AltList
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb output/com.eoln.antidarksword_${{ env.VERSION }}_iphoneos-arm64.deb

      - name: Compile TrollFools Dylib
        run: |
          # MAKEFLAGS= prevents BSD make from propagating "-f Makefile.trollfools"
          # into sub-makes spawned by Theos, which would fail inside subproject dirs.
          MAKEFLAGS= make -f Makefile.trollfools clean
          MAKEFLAGS= make -f Makefile.trollfools FINALPACKAGE=1
          DYLIB=$(find .theos/obj -name "AntiDarkSword.dylib" | head -1)
          cp "$DYLIB" output/AntiDarkSword_${{ env.VERSION }}_TrollFools.dylib

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSword-Packages
          path: output/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AntiDarkSword v${{ env.VERSION }} (Build #${{ github.run_number }})"
          body: |
            Automated builds of AntiDarkSword v${{ env.VERSION }}.

            | File | For |
            |---|---|
            | `*_iphoneos-arm.deb` | Rootful jailbreaks (checkra1n, Taurine, unc0ver) |
            | `*_iphoneos-arm64.deb` | Rootless jailbreaks (Dopamine, palera1n, meowbrek2) |
            | `*_TrollFools.dylib` | TrollStore / TrollFools (no jailbreak required) |

            **TrollFools install:** Open TrollFools → pick your app → tap **+** → select the `.dylib`
          files: output/*
          draft: true
          prerelease: false
          make_latest: false
