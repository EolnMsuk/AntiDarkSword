name: Compile & Release Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1

      - name: Fetch iOS 16.5 SDK
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/xybp888/iOS-SDKs.git
          cd iOS-SDKs
          git sparse-checkout set iPhoneOS16.5.sdk
          # Force remove the existing directory to prevent "Directory not empty" error
          rm -rf $THEOS/sdks/iPhoneOS16.5.sdk
          mv iPhoneOS16.5.sdk $THEOS/sdks/
          cd ..
          rm -rf iOS-SDKs

      - name: Compile the Tweak
        run: make package FINALPACKAGE=1

      - name: Upload .deb as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSword-Rootless
          path: ${{ github.workspace }}/packages/*.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AntiDarkSword Build #${{ github.run_number }}"
          body: "Automated build of AntiDarkSword targeting iOS 14.5 - 16.5."
          files: ${{ github.workspace }}/packages/*.deb
          draft: false
          prerelease: false
