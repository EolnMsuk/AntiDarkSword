name: Compile & Release Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Give the GitHub Actions bot permission to create a release
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Theos with default stable SDKs to prevent the 7z crash
      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1

      # 2. Manually fetch ONLY the iOS 17.0 SDK to bypass the extraction bug
      - name: Fetch iOS 17.0 SDK Manually
        run: |
          git clone --depth 1 --sparse https://github.com/xybp888/iOS-SDKs.git
          cd iOS-SDKs
          git sparse-checkout add iPhoneOS17.0.sdk
          mv iPhoneOS17.0.sdk $THEOS/sdks/
          cd ..
          rm -rf iOS-SDKs

      - name: Compile the Tweak
        run: make package FINALPACKAGE=1

      # (Optional) Keep the artifact upload as a backup
      - name: Upload .deb as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSword-Rootless
          path: ${{ github.workspace }}/packages/*.deb

      # Create the Release and upload the .deb file directly to it
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Automatically generates a unique tag based on the workflow run number
          tag_name: build-${{ github.run_number }}
          name: "AntiDarkSword Build #${{ github.run_number }}"
          body: "Automated build of AntiDarkSword compiled directly from the latest push to the main branch."
          files: ${{ github.workspace }}/packages/*.deb
          draft: false
          prerelease: false
