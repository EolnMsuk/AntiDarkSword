name: Compile & Release Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        uses: Randomblock1/theos-action@v1
        # We leave this default to get the standard environment set up

      - name: Fetch Required SDKs Manually
        run: |
          mkdir -p $THEOS/sdks
          git clone --depth 1 --filter=blob:none --sparse https://github.com/xybp888/iOS-SDKs.git
          cd iOS-SDKs
          # Initialize sparse-checkout and add the specific versions needed
          git sparse-checkout set iPhoneOS15.0.sdk iPhoneOS17.0.sdk
          mv *.sdk $THEOS/sdks/
          cd ..
          rm -rf iOS-SDKs

      - name: Compile the Tweak
        run: make package FINALPACKAGE=1

      - name: Upload .deb as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiDarkSword-Rootless
          path: ${{ github.workspace }}/packages/*.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AntiDarkSword Build #${{ github.run_number }}"
          body: "Automated build of AntiDarkSword compiled for iOS 15.0 - 17.0 rootless."
          files: ${{ github.workspace }}/packages/*.deb
          draft: false
          prerelease: false
